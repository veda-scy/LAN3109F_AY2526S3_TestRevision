<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vocabulary Revision Practice</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f6f8;
    margin: 20px;
}

/* HEADING */
h1 {
    text-align: center;
    color: #0078D7;
    margin-bottom: 20px;
}

/* 2-COLUMN LAYOUT */
.container {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 12px;
    max-width: 1000px;
    margin: auto;
}

/* BUTTON BASE */
button {
    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    text-align: left;
    transition: 0.2s;
}

/* WORD BUTTON (LEFT) */
.word-btn {
    background: #ffffff;
    border: 2px solid #0078D7;
    font-size: 18px;
    font-weight: bold;
}

/* SENTENCE BUTTON (RIGHT) */
.sentence-btn {
    background: #0078D7;
    color: white;
    font-size: 18px;
    line-height: 1.6;
}

/* SPEAKER ICON */
.icon {
    font-size: 22px;
    margin-left: 10px;
}

/* ✅ ENHANCED WORD STYLE */
.bold-word {
    font-weight: bold;
    text-decoration: underline;
    color: #FFEB3B;     /* yellow */
    font-size: 20px;   /* slightly larger */
}

/* HOVER */
button:hover {
    opacity: 0.85;
}

/* CLICK */
button:active {
    transform: scale(0.97);
}
</style>
</head>

<body>

<h1>Click and Listen</h1>

<div class="container" id="container"></div>

<script>

// ✅ vocabulary list
const vocab = [

{word:"Area", sentence:"We will create a new activity area for teenagers."},
{word:"Appeal", sentence:"This programme will increase the appeal of our centre."},
{word:"Approval", sentence:"We need management approval before starting the project."},
{word:"Attraction", sentence:"The new game will become a popular attraction."},
{word:"Battle", sentence:"We will organise a dance battle for young people."},
{word:"Benefit", sentence:"One benefit is that more visitors will join our programme."},
{word:"Budget", sentence:"We need a clear budget for this proposal."},
{word:"Conference", sentence:"We will discuss this plan in the monthly conference."},
{word:"Enjoyment", sentence:"The activities will bring enjoyment to the participants."},
{word:"Feedback", sentence:"We will collect feedback after the event."},
{word:"Frontline", sentence:"Frontline staff will help manage the activities."},
{word:"Guideline", sentence:"We will prepare clear safety guidelines."},
{word:"Handling", sentence:"Staff training is needed for handling large groups."},
{word:"Hour", sentence:"The activity will last for two hours."},
{word:"Issue", sentence:"The main issue is the low number of visitors."},
{word:"Leadership", sentence:"This programme can improve students’ leadership skills."},
{word:"Live show", sentence:"We will have a live show every Sunday."},
{word:"Management", sentence:"The plan has strong support from management."},
{word:"Participant", sentence:"Each participant must register online."},
{word:"Participation", sentence:"We hope to increase youth participation."},
{word:"Pass-holder", sentence:"Pass-holders can enjoy special discounts."},
{word:"Performer", sentence:"Local performers will join the event."},
{word:"Platform", sentence:"We will use social media as a promotion platform."},
{word:"Programme", sentence:"This programme will run during the summer holiday."},
{word:"Profit", sentence:"The event may help increase company profit."},
{word:"Rating", sentence:"We expect the customer rating to improve."},
{word:"Review", sentence:"We will review the programme after one month."},
{word:"Ride", sentence:"We will introduce a new ride in the park."},
{word:"Section", sentence:"I work in the Youth Development Section."},
{word:"Stall", sentence:"There will be food stalls at the event."},
{word:"Surprise", sentence:"A special surprise will be prepared for visitors."},
{word:"Teen", sentence:"The activities are designed for teens aged 13 to 18."},
{word:"Tour", sentence:"We will offer a guided tour of the park."},
{word:"Waiting time", sentence:"This plan will reduce waiting time."},
{word:"Workplace", sentence:"This training will prepare teens for the workplace."},
{word:"Zone", sentence:"We will set up a sports zone for activities."},
{word:"Additional", sentence:"We will provide additional activities for visitors."},
{word:"Annual", sentence:"This can become an annual summer event."},
{word:"Available", sentence:"More facilities will be available after improvement."},
{word:"Early", sentence:"Early registration will receive a discount."},
{word:"Engaging", sentence:"The activities are fun and engaging."},
{word:"Exciting", sentence:"This is an exciting programme for young people."},
{word:"Insufficient", sentence:"The current activities are insufficient for demand."},
{word:"Magical", sentence:"Visitors will enjoy a magical experience."},
{word:"Meaningful", sentence:"The programme is meaningful for youth development."},
{word:"On-site", sentence:"Staff will provide on-site support during the event."},
{word:"Repeated", sentence:"We have received repeated complaints from visitors."},
{word:"Short-term", sentence:"This is a short-term solution to the problem."},
{word:"Technical", sentence:"Technical support will be provided for the event."},
{word:"Enough", sentence:"We have enough resources to carry out the plan."}

];

// ✅ emphasize function
function emphasize(word, sentence) {
    const base = word.toLowerCase();
    return sentence.replace(new RegExp(base + "[a-z-]*", "gi"),
        match => `<span class="bold-word">${match}</span>`
    );
}

const container = document.getElementById("container");

vocab.forEach((item, i) => {

    // LEFT BUTTON
    const wordBtn = document.createElement("button");
    wordBtn.className = "word-btn";
    wordBtn.innerHTML = `
        <span>${i + 1}. ${item.word}</span>
        <span class="icon">🔊</span>
    `;

    const wordAudio = new Audio(`audio/w${i + 1}.mp3`);
    wordBtn.onclick = () => {
        wordAudio.currentTime = 0;
        wordAudio.play();
    };

    // RIGHT BUTTON
    const sentenceBtn = document.createElement("button");
    sentenceBtn.className = "sentence-btn";
    sentenceBtn.innerHTML = `
        <span>${emphasize(item.word, item.sentence)}</span>
        <span class="icon">🔊</span>
    `;

    const sentenceAudio = new Audio(`audio/s${i + 1}.mp3`);
    sentenceBtn.onclick = () => {
        sentenceAudio.currentTime = 0;
        sentenceAudio.play();
    };

    container.appendChild(wordBtn);
    container.appendChild(sentenceBtn);
});

</script>

</body>
</html>
